# Prometheus scrape config — the Azure-Monitor analogue. Scrapes Kong's Prometheus
# plugin (per-consumer call/status/latency) over the edge network.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: ["kong:8001"]
        labels:
          service: kong-gateway
