#cloud-config
# Bootstraps a self-hosted GitHub Actions runner host: Docker + the runner binary
# (latest release) downloaded under a non-root `runner` user. Registration is done
# post-boot by deploy-runner.sh via `az vm run-command` so the short-lived token is
# never baked into custom data.
package_update: true
package_upgrade: false
packages:
  - curl
  - jq
  - git
  - docker.io
write_files:
  - path: /usr/local/bin/fetch-runner.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      ver="$(curl -fsSL https://api.github.com/repos/actions/runner/releases/latest | jq -r .tag_name | sed 's/^v//')"
      install -d -o runner -g runner /home/runner/actions-runner
      cd /home/runner/actions-runner
      curl -fsSL -o runner.tar.gz \
        "https://github.com/actions/runner/releases/download/v${ver}/actions-runner-linux-x64-${ver}.tar.gz"
      tar xzf runner.tar.gz && rm -f runner.tar.gz
      chown -R runner:runner /home/runner/actions-runner
      ./bin/installdependencies.sh
      echo "runner ${ver} staged"
runcmd:
  - systemctl enable --now docker
  - id runner >/dev/null 2>&1 || useradd -m -s /bin/bash runner
  - usermod -aG docker runner
  - /usr/local/bin/fetch-runner.sh
  - touch /home/runner/.cloud-init-done
