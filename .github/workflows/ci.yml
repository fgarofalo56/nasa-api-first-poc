name: CI
on:
  push: { branches: [ main ] }
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install tooling
        run: pip install ruff pytest httpx
      - name: Ruff format check
        run: ruff format --check . || true   # remove '|| true' once sources land
      - name: Ruff lint
        run: ruff check . || true            # remove '|| true' once sources land
      - name: Tests
        run: pytest -q || true               # remove '|| true' once tests land

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
