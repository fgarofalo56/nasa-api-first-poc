      - name: Compose up (core) + demo smoke
        run: |
          echo "TODO (build): docker compose --profile core up -d"
          echo "TODO (build): ./scripts/wait-for-healthy.sh && python client/query_supply_risk.py --program Artemis-3 --min-delay 30"
          echo "TODO (build): assert known High-tier Artemis-3 rows returned; docker compose down"
