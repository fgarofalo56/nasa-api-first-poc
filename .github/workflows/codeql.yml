# CodeQL — GitHub's first-party SAST. Findings surface in Security → Code scanning,
# and Copilot Autofix (once enabled in repo settings) proposes one-click fixes for them.
# Free on public repos; requires GitHub Advanced Security on private repos.
#
# Runners: GitHub-hosted `ubuntu-latest` (safe for a public repo — fork PRs never run
# on a self-hosted machine). Action versions are kept current by the github-actions
# Dependabot updater (.github/dependabot.yml).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC — catches newly published queries

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      security-events: write # upload code-scanning SARIF
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript # the Vite/React frontend
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds higher-signal security queries beyond the default pack.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
