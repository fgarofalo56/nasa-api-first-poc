# OpenSSF Scorecard — scores this repo's supply-chain posture (branch protection,
# pinned dependencies, token permissions, dangerous workflow patterns, …) and publishes
# the result to the Security tab + the public OpenSSF dashboard, which powers the README badge.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "18 6 * * 2" # weekly, Tuesday

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: [self-hosted, linux, x64] # swap to ubuntu-latest for GitHub-hosted runners
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the OpenSSF API (badge)
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true # enables the public score + README badge

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
