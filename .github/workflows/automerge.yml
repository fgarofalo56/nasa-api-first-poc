name: Auto-merge

# When CI succeeds for a pull request, merge it automatically — so PRs land in main
# without manual clicks. A PR is held back only if it carries a `hold` or
# `do-not-merge` label. (Free private repos can't use server-side required-status-check
# branch protection, so this workflow IS the gate: it runs only after CI succeeds.)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Merge the PR for this run's branch (unless held)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          PR_JSON="$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number,labels,title,isDraft --jq '.[0] // empty')"
          if [ -z "$PR_JSON" ]; then echo "No open PR for branch '$BRANCH' — nothing to merge."; exit 0; fi
          NUM="$(echo "$PR_JSON" | jq -r .number)"
          DRAFT="$(echo "$PR_JSON" | jq -r .isDraft)"
          HELD="$(echo "$PR_JSON" | jq -r '[.labels[].name] | any(. == "hold" or . == "do-not-merge")')"
          if [ "$DRAFT" = "true" ]; then echo "PR #$NUM is a draft — skipping."; exit 0; fi
          if [ "$HELD" = "true" ]; then echo "PR #$NUM is labeled hold/do-not-merge — skipping."; exit 0; fi
          echo "CI green — squash-merging PR #$NUM."
          gh pr merge "$NUM" --repo "$REPO" --squash --delete-branch
