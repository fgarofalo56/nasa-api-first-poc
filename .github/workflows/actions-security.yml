# zizmor — static analysis for GitHub Actions workflows themselves (template-injection,
# over-broad GITHUB_TOKEN permissions, unpinned actions, dangerous triggers). This is the
# "secure the CI/CD pipeline, not just the app" control. Results → Security → Code scanning.
name: Actions security (zizmor)

on:
  push:
    branches: [main]
    paths: [".github/workflows/**"]
  pull_request:
    branches: [main]
    paths: [".github/workflows/**"]
  schedule:
    - cron: "9 7 * * 3" # weekly, Wednesday

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: [self-hosted, linux, x64] # swap to ubuntu-latest for GitHub-hosted runners
    permissions:
      contents: read
      security-events: write # upload zizmor SARIF
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # enables online audits (e.g. ref confusion)
        run: |
          pip install zizmor
          zizmor --format sarif . > zizmor.sarif

      - name: Upload zizmor results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor
