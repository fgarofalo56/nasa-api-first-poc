name: Request Copilot review

# Best-effort: ask GitHub Copilot to code-review each new PR. Copilot code review
# requires Copilot to be enabled for the account/repo; if it isn't available the step
# is non-fatal and you can request a review manually (PR → Reviewers → Copilot).

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot:
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Request Copilot as a reviewer (non-fatal)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # The Copilot reviewer is requested via the standard requested_reviewers API.
          if gh api --method POST "repos/$REPO/pulls/$PR/requested_reviewers" \
               -f "reviewers[]=copilot-pull-request-reviewer[bot]" >/dev/null 2>&1; then
            echo "Requested Copilot code review on PR #$PR."
          else
            echo "::notice::Could not auto-request Copilot review (needs Copilot enabled for this repo)."
            echo "Request it manually: PR #$PR → Reviewers → Copilot."
          fi
