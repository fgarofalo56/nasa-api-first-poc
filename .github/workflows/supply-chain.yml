# Supply-chain scan — Trivy finds vulnerable dependencies, Dockerfile/Bicep/compose
# misconfigurations, and stray secrets (results → Security → Code scanning); then we
# emit an SPDX SBOM (EO 14028 / OMB M-22-18) as a build artifact. No image build needed:
# filesystem + config scanning keeps this fast and deterministic.
name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 5 * * 1" # weekly — re-scan against newly disclosed CVEs

permissions:
  contents: read

jobs:
  scan:
    name: Trivy scan + SBOM
    runs-on: [self-hosted, linux, x64] # swap to ubuntu-latest for GitHub-hosted runners
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - name: Trivy — vulns, misconfig & secrets (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate SPDX SBOM for the repository
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
